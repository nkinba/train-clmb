# Climb-Forge мҡҙмҳҒ нҷҳкІҪ (ADR-6, ADR-8 / S13, S14)
#
# кө¬м„ұ:
#   pocketbase: ../pocketbase/DockerfileлЎң л№Ңл“ң. internal л„ӨнҠёмӣҢнҒ¬л§Ң л…ём¶ң.
#   caddy:      80/443 нҳёмҠӨнҠё л°”мқёл”©. мһҗлҸҷ SSL(Let's Encrypt). PBлЎң reverse proxy.
#   backup:     мқјмқј л°ұм—… (S14). PB admin API вҶ’ R2 м—…лЎңл“ң вҶ’ 30мқј cleanup.
#
# мӢӨн–ү (VMм—җм„ң):
#   cd /opt/climb-forge/infra/prod
#   cp .env.prod.example .env && vi .env       # DOMAIN, ACME_EMAIL, R2_*, PB_ADMIN_* мұ„мӣҖ
#   docker compose -f docker-compose.prod.yml --env-file .env up -d
#
# кІҖмҰқ:
#   docker compose ps           # м„ё м»Ён…Ңмқҙл„Ҳ healthy нҷ•мқё
#   curl https://$DOMAIN/api/health
#   лёҢлқјмҡ°м Җ https://$DOMAIN/_/  вҶ’ admin UI
#   docker compose logs backup  # мІ« л°ұм—… кІ°кіј (BACKUP_ON_START=1)

services:
  pocketbase:
    build:
      context: ../pocketbase
      args:
        PB_VERSION: 0.22.21
    image: climb-forge-pocketbase:0.22.21
    container_name: climb-forge-pb
    restart: unless-stopped
    # host 8090 л…ём¶ң м•Ҳ н•Ё вҖ” CaddyлҘј нҶөн•ҙм„ңл§Ң мҷёл¶Җ м ‘к·ј.
    expose:
      - "8090"
    volumes:
      - ${DATA_DIR:-./data}/pb_data:/pb_data
      - ../pocketbase/pb_migrations:/pb_migrations:ro
    healthcheck:
      # мІ« л¶ҖнҢ… мӢң л§Ҳмқҙк·ёл Ҳмқҙм…ҳмқҙ л¬ҙкұ°мҡё мҲҳ мһҲм–ҙ start_period л„үл„үнһҲ.
      # Caddy depends_onк°Җ service_healthy лҢҖкё° вҶ’ мІ« л¶ҖнҢ… мӢң ACME challenge мңҲлҸ„мҡ° ліҙмЎҙ.
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1:8090/api/health"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - internal

  caddy:
    image: caddy:2.8-alpine
    container_name: climb-forge-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${DATA_DIR:-./data}/caddy_data:/data         # ACME мқёмҰқм„ң (мҳҒмҶҚ)
      - ${DATA_DIR:-./data}/caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:?DOMAIN env required (e.g. pb.example.com)}
      - ACME_EMAIL=${ACME_EMAIL:?ACME_EMAIL env required (Let's Encrypt м•ҢлҰјмҡ©)}
    depends_on:
      pocketbase:
        condition: service_healthy
    networks:
      - internal
      - public

  backup:
    build:
      context: ./backup
    image: climb-forge-backup:s14
    container_name: climb-forge-backup
    restart: unless-stopped
    # м»Ён…Ңмқҙл„Ҳ лӮҙл¶Җ PB м ‘к·ј вҖ” internal л„ӨнҠёмӣҢнҒ¬. R2лҠ” мҷёл¶Җлқј publicлҸ„ н•„мҡ”.
    networks:
      - internal
      - public
    depends_on:
      pocketbase:
        condition: service_healthy
    environment:
      # PB лӮҙл¶Җ URL вҖ” service name + 8090 (internal network).
      PB_INTERNAL_URL: http://pocketbase:8090
      PB_ADMIN_EMAIL: ${PB_ADMIN_EMAIL:?PB_ADMIN_EMAIL required (л°ұм—…мқҙ PB admin APIлҘј нҳём¶ң)}
      PB_ADMIN_PASSWORD: ${PB_ADMIN_PASSWORD:?PB_ADMIN_PASSWORD required}
      # л°ұм—… мҠӨмјҖмӨ„ (UTC). 04:00 KST = 19:00 UTC (м „лӮ ). RUNBOOK В§7.3.
      BACKUP_HOUR_UTC: ${BACKUP_HOUR_UTC:-19}
      BACKUP_MINUTE_UTC: ${BACKUP_MINUTE_UTC:-0}
      # мІ« мӢңмһ‘ мӢң мҰүмӢң 1нҡҢ мӢӨн–ү (кІҖмҰқ/н…ҢмҠӨнҠёмҡ©).
      # мҡҙмҳҒ кё°ліё 0 вҖ” кІҖмҰқ мӢңлҠ” `BACKUP_ON_START=1 docker compose ... up backup` лӘ…мӢң override.
      BACKUP_ON_START: ${BACKUP_ON_START:-0}
      # мӢӨнҢЁ мӢң мҳөм…ҳ webhook м•ҢлҰј (Slack/Discord/Telegram л“ұ). л№„м–ҙмһҲмңјл©ҙ silent.
      BACKUP_ALERT_WEBHOOK: ${BACKUP_ALERT_WEBHOOK:-}
      # R2 (Cloudflare) вҖ” S3 нҳёнҷҳ. rcloneмқҖ RCLONE_CONFIG_* нҷҳкІҪліҖмҲҳл§ҢмңјлЎң лҸҷмһ‘.
      # лҜёл””м–ҙ(v1.1)лҠ” лі„лҸ„ access key + лі„лҸ„ prefix(`media/`) лҳҗлҠ” лі„лҸ„ лІ„нӮ·мңјлЎң кІ©лҰ¬ к¶ҢмһҘ.
      R2_BUCKET: ${R2_BUCKET:?R2_BUCKET required}
      R2_PREFIX: ${R2_PREFIX:-auto}
      RCLONE_CONFIG_R2_TYPE: s3
      RCLONE_CONFIG_R2_PROVIDER: Cloudflare
      RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:?R2_ACCESS_KEY_ID required}
      RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:?R2_SECRET_ACCESS_KEY required}
      RCLONE_CONFIG_R2_ENDPOINT: https://${R2_ACCOUNT_ID:?R2_ACCOUNT_ID required}.r2.cloudflarestorage.com
      RCLONE_CONFIG_R2_REGION: auto

networks:
  internal:
    # Caddy вҶ” PocketBase вҶ” backup. мҷёл¶Җ м ‘к·ј м°ЁлӢЁ.
    driver: bridge
  public:
    # Caddy вҶ” мҷёл¶Җ. host 80/443.
    driver: bridge
