# Breakteau 운영 환경 (ADR-6, ADR-8 / S13, S14)
#
# 구성:
#   pocketbase: ../pocketbase/Dockerfile로 빌드. internal 네트워크만 노출.
#   caddy:      80/443 호스트 바인딩. 자동 SSL(Let's Encrypt). PB로 reverse proxy.
#   backup:     일일 백업 (S14). PB admin API → R2 업로드 → 30일 cleanup.
#
# 실행 (VM에서):
#   cd /opt/breakteau/infra/prod
#   cp .env.prod.example .env && vi .env       # DOMAIN, ACME_EMAIL, R2_*, PB_ADMIN_* 채움
#   docker compose -f docker-compose.prod.yml --env-file .env up -d
#
# 검증:
#   docker compose ps           # 세 컨테이너 healthy 확인
#   curl https://$DOMAIN/api/health
#   브라우저 https://$DOMAIN/_/  → admin UI
#   docker compose logs backup  # 첫 백업 결과 (BACKUP_ON_START=1)

services:
  pocketbase:
    build:
      context: ../pocketbase
      args:
        PB_VERSION: 0.22.21
    image: breakteau-pocketbase:0.22.21
    container_name: breakteau-pb
    restart: unless-stopped
    # host 8090 노출 안 함 — Caddy를 통해서만 외부 접근.
    expose:
      - "8090"
    volumes:
      - ${DATA_DIR:-./data}/pb_data:/pb_data
      - ../pocketbase/pb_migrations:/pb_migrations:ro
    healthcheck:
      # 첫 부팅 시 마이그레이션이 무거울 수 있어 start_period 넉넉히.
      # Caddy depends_on가 service_healthy 대기 → 첫 부팅 시 ACME challenge 윈도우 보존.
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1:8090/api/health"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - internal

  caddy:
    image: caddy:2.8-alpine
    container_name: breakteau-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${DATA_DIR:-./data}/caddy_data:/data         # ACME 인증서 (영속)
      - ${DATA_DIR:-./data}/caddy_config:/config
      - ${DATA_DIR:-./data}/app:/srv/app:ro          # 프론트 정적 자산 (S15)
    environment:
      - PB_DOMAIN=${PB_DOMAIN:?PB_DOMAIN env required (e.g. pb.example.com)}
      - APP_DOMAIN=${APP_DOMAIN:?APP_DOMAIN env required (e.g. app.example.com)}
      - ACME_EMAIL=${ACME_EMAIL:?ACME_EMAIL env required (Let's Encrypt 알림용)}
    depends_on:
      pocketbase:
        condition: service_healthy
    networks:
      - internal
      - public

  backup:
    build:
      context: ./backup
    image: breakteau-backup:s14
    container_name: breakteau-backup
    restart: unless-stopped
    # 컨테이너 내부 PB 접근 — internal 네트워크. R2는 외부라 public도 필요.
    networks:
      - internal
      - public
    depends_on:
      pocketbase:
        condition: service_healthy
    environment:
      # PB 내부 URL — service name + 8090 (internal network).
      PB_INTERNAL_URL: http://pocketbase:8090
      PB_ADMIN_EMAIL: ${PB_ADMIN_EMAIL:?PB_ADMIN_EMAIL required (백업이 PB admin API를 호출)}
      PB_ADMIN_PASSWORD: ${PB_ADMIN_PASSWORD:?PB_ADMIN_PASSWORD required}
      # 백업 스케줄 (UTC). 04:00 KST = 19:00 UTC (전날). RUNBOOK §7.3.
      BACKUP_HOUR_UTC: ${BACKUP_HOUR_UTC:-19}
      BACKUP_MINUTE_UTC: ${BACKUP_MINUTE_UTC:-0}
      # 첫 시작 시 즉시 1회 실행 (검증/테스트용).
      # 운영 기본 0 — 검증 시는 `BACKUP_ON_START=1 docker compose ... up backup` 명시 override.
      BACKUP_ON_START: ${BACKUP_ON_START:-0}
      # 실패 시 옵션 webhook 알림 (Slack/Discord/Telegram 등). 비어있으면 silent.
      BACKUP_ALERT_WEBHOOK: ${BACKUP_ALERT_WEBHOOK:-}
      # R2 (Cloudflare) — S3 호환. rclone은 RCLONE_CONFIG_* 환경변수만으로 동작.
      # 미디어(v1.1)는 별도 access key + 별도 prefix(`media/`) 또는 별도 버킷으로 격리 권장.
      R2_BUCKET: ${R2_BUCKET:?R2_BUCKET required}
      R2_PREFIX: ${R2_PREFIX:-auto}
      RCLONE_CONFIG_R2_TYPE: s3
      RCLONE_CONFIG_R2_PROVIDER: Cloudflare
      RCLONE_CONFIG_R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:?R2_ACCESS_KEY_ID required}
      RCLONE_CONFIG_R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:?R2_SECRET_ACCESS_KEY required}
      RCLONE_CONFIG_R2_ENDPOINT: https://${R2_ACCOUNT_ID:?R2_ACCOUNT_ID required}.r2.cloudflarestorage.com
      RCLONE_CONFIG_R2_REGION: auto

networks:
  internal:
    # Caddy ↔ PocketBase ↔ backup. 외부 접근 차단.
    driver: bridge
  public:
    # Caddy ↔ 외부. host 80/443.
    driver: bridge
